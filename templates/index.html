<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advanced Cybersecurity Audit & Network Discovery Tool — discover, inventory, and analyze network assets using legal, passive techniques.">
    <title>NetAudit — Cybersecurity Discovery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <path d="M12 8v4M12 16h.01"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="logo-name">NetAudit</span>
                    <span class="logo-sub">Cybersecurity Discovery</span>
                </div>
            </div>
        </div>

        <div class="sidebar-nav">
            <a href="#dashboard" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="#discovery" class="nav-item" data-page="discovery" id="nav-discovery">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                    <path d="M11 8v6M8 11h6"/>
                </svg>
                <span>Discovery</span>
            </a>
            <a href="#inventory" class="nav-item" data-page="inventory" id="nav-inventory">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                <span>Inventory</span>
            </a>
            <a href="#sniffer" class="nav-item" data-page="sniffer" id="nav-sniffer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <span>Sniffer</span>
                <span class="sniffer-indicator" id="sniffer-live-dot" style="display:none"></span>
            </a>
            <a href="#vlans" class="nav-item" data-page="vlans" id="nav-vlans">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span>VLAN Intel</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="status-badge" id="admin-status">
                <span class="status-dot"></span>
                <span class="status-text">Checking...</span>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
        <!-- Page header -->
        <header class="page-header" id="page-header">
            <div class="page-title-area">
                <h1 id="page-title">Dashboard</h1>
                <p id="page-subtitle" class="page-subtitle">Network overview and statistics</p>
            </div>
            <div class="page-actions" id="page-actions"></div>
        </header>

        <!-- Dynamic content area -->
        <div id="page-content" class="page-content">
            <!-- Content injected by JS router -->
        </div>
    </main>

    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/utils/api.js"></script>
    <script src="/static/js/utils/websocket.js"></script>
    <script src="/static/js/components/dashboard.js"></script>
    <script src="/static/js/components/discovery.js"></script>
    <script src="/static/js/components/inventory.js"></script>
    <script src="/static/js/components/sniffer.js"></script>
    <script src="/static/js/components/vlans.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
